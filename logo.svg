<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

  <!-- Background Circle -->
  <circle cx="250" cy="250" r="230" fill="#0f172a"/>

  <!-- Snowflake / AC Symbol -->
  <g stroke="#38bdf8" stroke-width="8" stroke-linecap="round">
    <line x1="250" y1="120" x2="250" y2="260"/>
    <line x1="190" y1="150" x2="310" y2="230"/>
    <line x1="190" y1="230" x2="310" y2="150"/>
    <line x1="250" y1="260" x2="210" y2="310"/>
    <line x1="250" y1="260" x2="290" y2="310"/>
  </g>

  <!-- Text GM & Sons -->
  <text x="250" y="380" text-anchor="middle"
        font-size="40" fill="white" font-family="Arial, sans-serif" font-weight="bold">
    GM & Sons
  </text>

  <!-- Subtitle -->
  <text x="250" y="420" text-anchor="middle"
        font-size="16" fill="#94a3b8" font-family="Arial, sans-serif">
    AC Repair • Maintenance • Installation
